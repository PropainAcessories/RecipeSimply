app = "recipesimply"
primary_region = "ord"

[processes]
  app = "bash /app/entrypoint.sh"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ["app"]

[checks]
  [checks.health]
    type = "http"
    interval = "15s"
    timeout = "2s"
    path = "/health/"

[deploy]
  strategy = "immediate"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
