# fly.toml app configuration file generated for recipesimply-frontend on 2026-04-04T10:39:40-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "recipesimply"
primary_region = "ord"

[build]
  dockerfile = "../Dockerfile"

[env]
  DJANGO_SETTINGS_MODULE = "RecipeSimply.settings.prod"
  PORT = "8000"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"

