app = "recipesimply"

[build]
  dockerfile = "Dockerfile.prod"

[mounts]
  source="mysqldata"
  destination="/var/lib/mysql"

[env]
  PORT = "8000"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 80
