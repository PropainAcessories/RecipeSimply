# fly.toml app configuration file generated for recipesimply-frontend on 2026-04-04T10:39:40-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "recipesimply"
primary_region = "ord"

[processes]
  app = "bash /app/entrypoint.sh"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
