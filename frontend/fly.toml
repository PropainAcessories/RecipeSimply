# fly.toml app configuration file generated for recipesimply-frontend on 2026-04-04T10:39:40-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "recipesimply"
primary_region = "ord"

[build]
  dockerfile = "../Dockerfile"

[env]
  PORT = "3000"

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
